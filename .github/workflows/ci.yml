name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - run: npm install

      - run: node generate.mjs

      - run: node packages/flutter/scripts/generate-dart-icons.mjs

      - run: node packages/laravel/scripts/sync-icons.mjs

      - run: node packages/rails/scripts/sync-icons.mjs

      - run: npm run build --workspace=packages/core

      - name: Build all packages
        run: npm run build --workspaces --if-present

      - name: Run tests
        run: npx vitest run

      - name: Report bundle sizes
        run: |
          echo "## 📦 Bundle Sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Raw | Gzipped |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|---------|" >> $GITHUB_STEP_SUMMARY
          for pkg in core react vue svelte solid angular preact qwik astro lit vanilla alpine cli; do
            DIST="packages/$pkg/dist"
            if [ -d "$DIST" ]; then
              MAIN=$(find "$DIST" -maxdepth 1 -name "*.js" ! -name "*.d.ts" ! -name "*.global.js" | head -1)
              if [ -n "$MAIN" ]; then
                RAW=$(wc -c < "$MAIN" | tr -d ' ')
                GZ=$(gzip -c "$MAIN" | wc -c | tr -d ' ')
                RAW_KB=$(echo "scale=1; $RAW / 1024" | bc)
                GZ_KB=$(echo "scale=1; $GZ / 1024" | bc)
                if [ "$pkg" = "core" ]; then
                  PKG_NAME="@ajentik/doo-iconik"
                else
                  PKG_NAME="@ajentik/doo-iconik-$pkg"
                fi
                echo "| $PKG_NAME | ${RAW_KB}KB | ${GZ_KB}KB |" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done

      - name: Icon complexity audit (strict)
        # Fails the build if any icon exceeds the hard cap
        # (8 paths / 32 cmds / 600 d-chars). Soft-cap violations are
        # surfaced in the job summary but don't fail.
        shell: bash
        run: |
          set -eo pipefail
          mkdir -p docs
          STRICT_COMPLEXITY=1 COMPLEXITY_REPORT=docs/icon-complexity-baseline.json node generate.mjs | tee -a "$GITHUB_STEP_SUMMARY"
          HARD=$(node -e "console.log(JSON.parse(require('fs').readFileSync('docs/icon-complexity-baseline.json','utf8')).hardViolations.length)")
          SOFT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('docs/icon-complexity-baseline.json','utf8')).softViolations.length)")
          echo "Icon complexity — soft: $SOFT, hard: $HARD"

      - name: Verify icon counts match across frameworks
        run: |
          RAW_COUNT=$(node -e "const d=JSON.parse(require('fs').readFileSync('icon-data-raw.json','utf8')); console.log(Object.keys(d).length)")
          CORE_COUNT=$(grep -c 'viewBox: "' packages/core/src/icon-data.ts)
          FLUTTER_COUNT=$(grep -c "viewBox:" packages/flutter/lib/src/icon_data.dart)
          LARAVEL_COUNT=$(node -e "const d=JSON.parse(require('fs').readFileSync('packages/laravel/data/icon-data.json','utf8')); console.log(Object.keys(d).length)")
          RAILS_COUNT=$(node -e "const d=JSON.parse(require('fs').readFileSync('packages/rails/data/icon-data.json','utf8')); console.log(Object.keys(d).length)")

          echo "icon-data-raw.json: $RAW_COUNT"
          echo "core/icon-data.ts:  $CORE_COUNT"
          echo "flutter/icon_data.dart: $FLUTTER_COUNT"
          echo "laravel/icon-data.json: $LARAVEL_COUNT"
          echo "rails/icon-data.json:   $RAILS_COUNT"

          FAIL=0
          for NAME_COUNT in "core:$CORE_COUNT" "flutter:$FLUTTER_COUNT" "laravel:$LARAVEL_COUNT" "rails:$RAILS_COUNT"; do
            NAME="${NAME_COUNT%%:*}"
            COUNT="${NAME_COUNT##*:}"
            if [ "$COUNT" != "$RAW_COUNT" ]; then
              echo "::error::$NAME count ($COUNT) does not match raw count ($RAW_COUNT)"
              FAIL=1
            fi
          done

          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi

          echo "All icon counts match: $RAW_COUNT"
